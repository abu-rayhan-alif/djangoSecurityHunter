name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[dev]"
          pip install flake8

      - name: Lint
        run: flake8 .

      - name: Run tests
        run: pytest -q

      - name: Run django_security_hunter scan (package tree)
        run: |
          mkdir -p reports
          # Repo root is not a Django app: DJG001–012 skip without --settings. High
          # threshold keeps heuristic noise from failing CI; SARIF still uploads.
          django_security_hunter scan --project . --format sarif \
            --output reports/django_security_hunter.sarif \
            --threshold CRITICAL

      - name: Scan Django fixture (settings-based rules)
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}/tests/fixtures/djg001_proj
        run: |
          mkdir -p reports
          django_security_hunter scan \
            --project tests/fixtures/djg001_proj \
            --settings mysite.settings_ci \
            --format json \
            --output reports/django_security_hunter.fixture.json \
            --threshold CRITICAL
          python -c "
          import json
          from pathlib import Path
          d = json.loads(Path('reports/django_security_hunter.fixture.json').read_text(encoding='utf-8'))
          assert d.get('metadata', {}).get('django_settings_loaded') is True, d.get('metadata')
          print('fixture scan: django_settings_loaded=True')
          "

      - name: Upload SARIF
        if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
        # Keep CI green when Code Scanning is not enabled or upload is blocked.
        # TODO: Remove this after Code Scanning is enabled and SARIF upload is stable.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/django_security_hunter.sarif

