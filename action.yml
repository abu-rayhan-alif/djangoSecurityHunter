name: 'Django Security Hunter'
description: 'Fast, automated security and performance inspector for Django and DRF.'
author: 'Abu Rayhan Alif'
inputs:
  project:
    description: 'Path to project root directory'
    required: false
    default: '.'
  settings:
    description: >-
      Optional Django settings module (e.g. config.settings). Omit for static/file-based
      rules only; DJG001-DJG012 and other settings-backed rules need this plus deps/env.
    required: false
  threshold:
    description: 'Severity threshold (INFO, WARN, HIGH, CRITICAL)'
    required: false
    default: 'WARN'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_SETTINGS: ${{ inputs.settings }}
  args:
    - 'scan'
    - '--project'
    - ${{ inputs.project }}
    - '--threshold'
    - ${{ inputs.threshold }}
    - '--format'
    - 'sarif'
    - '--output'
    - 'django-security-hunter.sarif'

branding:
  icon: 'shield'
  color: 'blue'