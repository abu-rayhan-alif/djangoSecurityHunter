[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "djangoguard"
version = "0.1.0"
description = "Django + DRF security, reliability and performance inspector"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "djangoguard contributors" }]
dependencies = [
  "typer>=0.12.3",
  "django>=4.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0",
]

[project.scripts]
djangoguard = "djangoguard.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.djangoguard]
severity_threshold = "WARN"
query_count_threshold = 50
db_time_ms_threshold = 200
