[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
# PyPI distribution name (must differ from confusable names; see pypi.org/help/#project-name)
name = "django-guard-inspector"
version = "0.1.0"
description = "Django + DRF security, reliability and performance inspector"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Abu Rayhan Alif" }]
keywords = ["django", "drf", "security", "static-analysis", "linting", "sarif"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Web Environment",
  "Framework :: Django",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP :: Site Management",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
  "typer>=0.12.3",
  "django>=4.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0",
]

[project.urls]
Homepage = "https://github.com/abu-rayhan-alif/djangoGuard"
Repository = "https://github.com/abu-rayhan-alif/djangoGuard"

[project.scripts]
djangoguard = "djangoguard.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.djangoguard]
severity_threshold = "WARN"
query_count_threshold = 50
db_time_ms_threshold = 200
